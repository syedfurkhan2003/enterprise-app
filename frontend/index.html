<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise GitOps Platform</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:40px;
        }

        .container{
            background:white;
            max-width:700px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,.15);
        }

        h1{
            color:#0078d4;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }

        pre{
            background:#efefef;
            padding:15px;
            border-radius:5px;
        }
    </style>

</head>

<body>

<div class="container">

<h1>Enterprise GitOps Platform</h1>

<p>Frontend is running successfully.</p>

<button onclick="loadData()">Check Backend</button>

<pre id="result"></pre>

</div>

<script>

async function loadData() {

    console.log("Button clicked");

    try {

        console.log("Sending request...");

        const response = await fetch("http://localhost:5000/");

        console.log("Response received:", response);

        const data = await response.json();

        console.log("JSON:", data);

        document.getElementById("result").innerText =
            JSON.stringify(data, null, 4);

    } catch (error) {

        console.error("ERROR:", error);

    }

}

</script>

</body>
</html>
