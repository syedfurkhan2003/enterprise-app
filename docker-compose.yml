version: "3.9"

services:

  backend:
    build: ./backend

    container_name: backend

    ports:
      - "5000:5000"

    environment:
      ENVIRONMENT: development
      APP_VERSION: 1.0.0

    depends_on:
      - postgres

    networks:
      - enterprise-network


  frontend:
    build: ./frontend

    container_name: frontend

    ports:
      - "8080:80"

    depends_on:
      - backend

    networks:
      - enterprise-network


  postgres:

    image: postgres:15

    container_name: postgres

    restart: always

    environment:

      POSTGRES_DB: devopsdb

      POSTGRES_USER: admin

      POSTGRES_PASSWORD: Admin@123

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - enterprise-network


volumes:

  postgres-data:


networks:

  enterprise-network: